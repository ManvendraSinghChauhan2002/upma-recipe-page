
<!DOCTYPE html>
<html>

<head>
    <title>
      document
  </title>
    <style>
       
        
        form,label,input,button,p {
            text-align: center;
            font-size: 23px;
        }
    </style>
</head>

<body>
    <form>
        <label for="college_code">College Code of your college is:</label>
        <input type="number" value="192" id="college_code" name="college_code" readonly>
        <p>Enter your Roll Number which is the password and Date of birth below.</p>
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter your password here" maxlength="13" required><br>
        <label for="DOB">Date of Birth:</label> 
        <input type="text" id="DOB" name="DOB" placeholder="Enter your DOB here" maxlength="10" required><br>
        <button type="submit">Submit</button>
    </form>
</body>

</html>
